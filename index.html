<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Kỷ Yếu - Grid Theme</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Tạo nền lưới */
            background-color: #fdfaf0; /* Màu nền hơi vàng kem nhẹ giống ảnh */
            background-image: 
                linear-gradient(rgba(200, 200, 200, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 200, 200, 0.3) 1px, transparent 1px);
            background-size: 30px 30px; /* Độ rộng của mỗi ô lưới */
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .header {
            text-align: left;
            margin-bottom: 50px;
        }

        .logo-text {
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            color: #ff6b6b; /* Màu đỏ hồng */
            text-shadow: 4px 4px 0px #f9d423; /* Hiệu ứng đổ bóng vàng như ảnh */
            margin: 0;
            line-height: 1;
        }

        .sub-logo {
            font-size: 40px;
            font-weight: bold;
            color: #333;
            margin-top: -10px;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 10px 10px 0px #333;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="logo-text">GUU</h1>
            <div class="sub-logo">KỶ YẾU</div>
        </div>

        <div class="content-box">
            <h2>Chào mừng đến với Album Kỷ Yếu</h2>
            <p>Nơi lưu giữ những khoảnh khắc đẹp nhất của thanh xuân...</p>
            </div>
    </div>

</body>
</html>
